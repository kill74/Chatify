[package]
name = "clicord-server"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "clicord-server"
path = "src/main.rs"

[[bin]]
name = "clicord-client"
path = "src/client.rs"

[[bin]]
name = "discord_bot"
path = "src/discord_bot.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = "0.21"
tungstenite = "0.21"
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
dashmap = "5"
clap = { version = "=4.4.18", features = ["derive"] }
rand = "0.8"
x25519-dalek = "2"
chacha20poly1305 = "0.9"
pbkdf2 = "0.12"
crossterm = "0.27"
ratatui = "0.26"
chrono = "0.4"
env_logger = "0.11"
rpassword = "7"
cpal = "0.14"
rodio = "0.18"
image = "0.24"
serenity = { version = "0.11", features = ["client", "gateway", "standard_framework", "model"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true